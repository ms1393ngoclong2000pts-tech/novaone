<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Novaone</title>
    <style>
        :root { color-scheme: light; font-family: Arial, sans-serif; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef3fb; color: #263445; }
        main { width: min(440px, calc(100% - 32px)); padding: 28px; border-radius: 14px; background: #fff; box-shadow: 0 18px 45px rgba(33, 48, 73, .14); text-align: center; }
        img { width: 76px; height: 76px; object-fit: contain; margin-bottom: 18px; }
        h1 { margin: 0 0 10px; font-size: 28px; color: #0c9dcc; }
        p { margin: 0; line-height: 1.55; color: #647084; }
        code { display: inline-block; margin-top: 14px; padding: 8px 10px; border-radius: 8px; background: #f2f6fb; color: #1d2b3a; }
    </style>
</head>
<body>
    <main>
        <img src="novaone-logo.png" alt="Novaone">
        <h1>Novaone</h1>
        <p>APK đã sẵn sàng làm app WebView. Hãy cấu hình URL server public của Novaone trước khi gửi khách hàng test.</p>
        <code>capacitor.config.json</code>
    </main>
</body>
</html>
